<div class="container mt-4">
  <h2 class="text-center mb-4">Product Inventory</h2>
<div class="d-flex justify-content-end mb-3">
    <div class="row mb-3">
  <div class="row mb-3 align-items-center">

  <!-- 🔍 Search -->
  <div class="col-md-5">
    <input type="text"
           class="form-control"
           placeholder="🔍 Search product..."
           [(ngModel)]="searchText"
           (input)="filterProducts()">
  </div>

  <!-- 📂 Category Dropdown -->
  <div class="col-md-4">
    <select class="form-control"
            [(ngModel)]="selectedCategory"
            (change)="filterProducts()">
      <option value="">All Categories</option>
      <option *ngFor="let cat of categories" [value]="cat">
        {{ cat }}
      </option>
    </select>
  </div>

  <!-- ❌ Clear Filters -->
  <div class="col-md-3">
    <button class="btn btn-outline-secondary w-100"
            (click)="clearFilters()">
      Clear Filters
    </button>
  </div>

</div>
</div>
  <button class="btn btn-primary" (click)="toggleForm()">
    Add Product
  </button>
</div>
  <table class="table table-bordered table-striped table-hover shadow">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Price (₹)</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let product of paginatedProducts">
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.price }}</td>
        <td>
          <button class="btn btn-sm btn-warning me-2" (click)="editProduct(product)">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="deleteProduct(product.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div class="d-flex justify-content-center mt-3">

  <button class="btn btn-outline-primary me-2"
          (click)="prevPage()"
          [disabled]="currentPage === 1">
    Previous
  </button>

  <span class="align-self-center">
    Page {{ currentPage }}
  </span>

  <button class="btn btn-outline-primary ms-2"
          (click)="nextPage()"
          [disabled]="currentPage * itemsPerPage >= filteredProducts.length">
    Next
  </button>

</div>
  <div *ngIf="showForm" class="card p-3 mb-3 shadow">
  <h5>Add New Product</h5>
  <div class="row">
    <div class="col-md-3">
<input type="text" class="form-control" placeholder="Name" [(ngModel)]="newProduct.name" required>
    </div>

    <div class="col-md-3">
      <input type="text" class="form-control" placeholder="Category" [(ngModel)]="newProduct.category" required>
    </div>

    <div class="col-md-3">
      <input type="number" class="form-control" placeholder="Price" [(ngModel)]="newProduct.price" min="1" required>
    </div>

    <div class="col-md-3">
      <button class="btn btn-success w-100" (click)="addProduct()" [disabled]="!newProduct.name || !newProduct.category || !newProduct.price">
  {{ isEditMode ? 'Update' : 'Save' }}
</button>
    </div>
  </div>
</div>
</div>
